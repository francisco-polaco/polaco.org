baseURL: "https://polaco.org/"
locale: "en-us"
title: "Francisco Polaco Santos"
theme: hugo-profile

params:
  favicon: "/favicon.ico"
  animate: true
  description: "Francisco Santos — Engineering Manager at Human Ready. Engineer at heart, leading with purpose."
  images:
    - /og-image.jpg

  navbar:
    align: ms-auto
    brandName: "Polaco"
    disableSearch: true
    stickyNavBar:
      enable: true
      showOnScrollUp: true
    menus:
      disableAbout: false
      disableExperience: false
      disableEducation: false
      disableProjects: false
      disableAchievements: true
      disableContact: true

  hero:
    enable: true
    intro: "Hi, I'm"
    title: "Francisco Polaco Santos."
    subtitle: "Engineer at heart, leading with purpose."
    content: "Engineering Manager @ [Human Ready](https://humanready.io/)"
    image: "https://avatars.githubusercontent.com/u/5599025?v=4"
    bottomImage:
      enable: false
    button:
      enable: false
    socialLinks:
      fontAwesomeIcons:
        - icon: fab fa-linkedin
          url: "https://www.linkedin.com/in/francisco-polaco-santos"
        - icon: fab fa-github
          url: "https://github.com/francisco-polaco"
        - icon: fas fa-envelope
          url: "mailto:francisco@polaco.org"

  about:
    enable: true
    title: "About Me"
    image: "https://avatars.githubusercontent.com/u/5599025?v=4"
    content: |-
      I'm an engineer turned engineering manager, currently leading teams at [Human Ready](https://humanready.io/). I've spent my career building software and the people around it — I care as much about how teams work as about the code they ship.

      *(More about my journey coming soon.)*

      ---

      **Values & Philosophy**

      *(Coming soon — what I believe about engineering, leadership, and people.)*
    skills:
      enable: false

  experience:
    enable: true
    title: "Experience"
    items:
      - company: "Human Ready"
        companyUrl: "https://humanready.io/"
        jobs:
          - name: "Engineering Manager"
            date: "Apr 2024 - Present"
            content: "Leading the product engineering team and project teams."
          - name: "Senior Software Engineer"
            date: "Apr 2022 - Mar 2024"
            content: "Built highly scalable analytics products working closely with product and engineering. Stack: FastAPI, React, Docker. First steps leading technical projects and mentoring junior engineers."

      - company: "Feedzai"
        companyUrl: "https://feedzai.com/"
        jobs:
          - name: "Software Engineer"
            date: "Oct 2018 - Mar 2022"
            content: "Worked on Feedzai Genome (link analysis for financial crime detection) and Case Manager (transaction alert management). Led key parts of a major Genome redesign. Completed a CS rotation as a delivery engineer, gaining direct client-facing exposure."

  education:
    enable: true
    title: "Education"
    items:
      - title: "Master's Degree, Computer Science and Engineering"
        school:
          name: "Instituto Superior Técnico"
          url: "https://tecnico.ulisboa.pt/"
        date: "2016 - 2018"
        GPA: "16 / 20"
        content: "Focused on Distributed Systems and Cybersecurity. Thesis: PRIME — a probabilistic membership protocol for large-scale systems."

      - title: "Bachelor's Degree, Computer Engineering"
        school:
          name: "Instituto Superior Técnico"
          url: "https://tecnico.ulisboa.pt/"
        date: "2013 - 2016"
        GPA: "16 / 20"
        content: "Core curriculum: Computer Networks, Distributed Systems, Software Engineering, AI, Compilers, Databases."

  achievements:
    enable: false

  projects:
    enable: true
    title: "Things I've built"
    items:
      - title: "Markdown TTS Reader"
        content: "Reads markdown notes aloud. Built because I needed a way to go through notes hands-free in the car — no existing tool did exactly this."
        featured:
          name: "Open app"
          link: "https://tts.polaco.org/"
        links:
          - icon: "fa fa-globe"
            url: "https://tts.polaco.org/"

      - title: "Compound Interest Calculator"
        content: "A compound interest calculator with all the fields you actually need. Most calculators were missing something, so I prompted a better one."
        featured:
          name: "Open app"
          link: "https://grow.polaco.org/"
        links:
          - icon: "fa fa-globe"
            url: "https://grow.polaco.org/"

  contact:
    enable: false

  footer:
    recentPosts:
      enable: false
    socialNetworks:
      github: "https://github.com/francisco-polaco"
      linkedin: "https://www.linkedin.com/in/francisco-polaco-santos"
